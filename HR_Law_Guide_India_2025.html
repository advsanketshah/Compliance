 social security for employees earning up to ₹21,000/month. Employee pays 0.75%, employer pays 3.25% of gross salary."},{term:"Fixed-Term Employment",def:"Employment for a defined period linked to a project or contract. The new Codes regulate this clearly for the first time, including entitlement to gratuity after 1 year."},{term:"Retrenchment",def:"Laying off employees for business reasons, not misconduct. Requires notice, severance (15 days pay per year of service), and for companies with 300+ workers, prior government permission."},{term:"Standing Orders",def:"Documented workplace rules covering working hours, leave, misconduct definitions, and termination grounds. Mandatory for companies above a specified size under the Industrial Relations Code."},{term:"ICC (Internal Complaints Committee)",def:"The body a company must set up under POSH Act to receive and investigate sexual harassment complaints. Mandatory for companies with 10+ employees."},{term:"GRC (Grievance Redressal Committee)",def:"Committee for general workplace grievances (pay, unfair treatment, conditions). Separate from the ICC. Now mandatory for companies with 20+ workers under the new Industrial Relations Code."},{term:"Moonlighting",def:"An employee secretly working a second job while in full-time employment. Not explicitly illegal under Indian law, but prohibited by most IT employment contracts and upheld by courts."},{term:"Gig Worker",def:"Workers providing services on-demand through digital platforms. First formally recognised in Indian law under the SS Code 2020. Aggregators must contribute 1-2% of turnover to a social security fund for these workers."},{term:"National Floor Wage",def:"A minimum wage set by the Central Government below which no state can set its minimum wage. All states must set their minimum wages at or above this level."},{term:"Re-skilling Fund",def:"A new fund under the Industrial Relations Code. When an employer retrenches a worker, they must contribute 15 days wages pe
